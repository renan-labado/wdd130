<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Living Water Rafting Company.</title>
    <meta name="description" content="Contact us page for Renan Labado's wwr page. The rafting company is named 'Living Water Rafting Company.'
      Contains social media accounts of the author.">
    <meta name="author" content="Renan Labado">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header class="contact">
        <img src="images/wwr-photo.jpg" alt="Boat Splash Photo">
        <nav>
            <ul class="navigation">
                <li><a href="https://renan-labado.github.io/wdd130/wwr/index.html">Home</a></li>
                <li><a href="https://renan-labado.github.io/wdd130/wwr/about.html">About Us</a></li>
                <li><a href="https://renan-labado.github.io/wdd130/wwr/trips.html">Trips</a></li>
                <li><a href="https://renan-labado.github.io/wdd130/wwr/contact.html">Contact Us</a>
                </li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="address">
            <h1>Living Water Rafting Company</h1>
            <p>2930 A. Mabini Street</p>
            <p>Quezion City, Philippinse</p>
            <p>+639469118201</p>
            <p>renz.backup2121@gmail.com</p>
        </div>
        <div class="quiznmap">
            <div class="map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d1928.9070946679767!2d121.07465249028994!3d14.779493687864734!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sph!4v1775641636750!5m2!1sen!2sph"
                  width="450" height="470" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
            <form>
                <div class="name">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required
                      placeholder="(first and last name)">
                    <br><br>
                </div>
                <div class="email">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required
                      placeholder="yourusername@mail.com">
                    <br>
                </div>
                <div class="purpose">
                    <p>Message Purpose:</p>
                    <input type="radio" id="general_inquiry" name="msg_purpose"
                      value="General Inquiry">
                    <label for="general_inquiry">General Inquiry</label>
                    <br>
                    <input type="radio" id="reservation_question" name="msg_purpose"
                      value="General Inquiry">
                    <label for="reservation_question">Reservation Question</label>
                    <br>
                    <input type="radio" id="website_suggestion" name="msg_purpose"
                      value="General Inquiry">
                    <label for="website_suggestion">Website Suggestion</label>
                    <br><br>
                </div>
                <div class="message">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="3"
                      placeholder="Type here"></textarea>
                    <br><br>
                </div>
                <div class="subscribe">
                    <label><input type="checkbox" id="subscribe" name="subscribe">Please
                        subscribe me to
                        the monthly newsletter</label>
                </div>
                <br>
                <button type="submit">Get in Touch!</button>
            </form>
        </div>
        <section class="serveyou">
            <h2>We Are Here to Serve You!</h2>
            <figure>
                <img src="images/renz-labado.jpg" alt="Man with a church behind him">
                <figcaption>Renzo - CEO</figcaption>
            </figure>
            <figure>
                <img src="images/renz-labado2.jpg" alt="Man on a red background">
                <figcaption>Renz - Tour Guide</figcaption>
            </figure>
            <figure>
                <img src="images/renz-labado1.jpg" alt="Man in the temple">
                <figcaption>Renan - Custodial</figcaption>
            </figure>
        </section>
    </main>
    <footer>
        <p>© 2026 | Living Water Rafting Company | Renan Labado</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.jpg" alt="Facebook Icon">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin.jpg" alt="LinkedIn Icon">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.jpg" alt="Instagram Icon">
            </a>
        </nav>
    </footer>
</body>

</html>
